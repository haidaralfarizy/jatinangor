<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jatinangor Guide — Panduan Mahasiswa Jatinangor</title>
    <meta name="description"
        content="Direktori tempat makan, laundry, fotokopi, dan layanan penting lainnya di sekitar kampus ITB Jatinangor dan Unpad.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">

    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z'></path><circle cx='12' cy='10' r='3'></circle></svg>">

    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <header class="header">
        <div class="container">
            <div class="logo">
                <i data-lucide="map-pin" class="logo-icon"></i>
                <h1>Jatinangor Guide</h1>
            </div>
            <p class="tagline">Segala yang kamu butuhkan di Jatinangor, dari mahasiswa untuk mahasiswa.</p>
        </div>
    </header>

    <section class="controls-section">
        <div class="container">
            <div class="search-box">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="search-input" placeholder="Cari warteg, kafe nugas, fotokopi, laundry..."
                    autocomplete="off">
            </div>

            <div id="category-pills" class="category-pills">
            </div>
        </div>
    </section>

    <main class="main-content">
        <div class="container">
            <div id="directory-grid" class="directory-grid">
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2026 Jatinangor Guide. Dibuat dengan ❤️ oleh mahasiswa STEI-K.</p>
            <p class="footer-links">
                <a href="https://github.com" target="_blank" rel="noopener noreferrer">
                    <i data-lucide="github" class="icon-xs"></i> GitHub
                </a>
            </p>
        </div>
    </footer>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="scripts/main.js"></script>
</body>

</html>
